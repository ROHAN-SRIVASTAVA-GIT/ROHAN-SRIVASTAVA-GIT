<text x="350" y="78" font-size="34" font-weight="800" text-anchor="middle" fill="#e6edf3">CURIOSITY LEVEL: 100%<animate attributeName="opacity" values="1;1;0.6;1;0.85;1" dur="1.7s" repeatCount="indefinite"/></text>
