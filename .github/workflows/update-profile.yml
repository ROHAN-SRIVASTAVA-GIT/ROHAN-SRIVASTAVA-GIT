name: Update profile SVGs

on:
  schedule:
    - cron: "30 0 * * *" # daily at 00:30 UTC (06:00 IST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_profile.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add light_mode.svg dark_mode.svg stats_card.svg top_langs.svg
          git diff --cached --quiet || (git commit -m "chore: refresh profile uptime and stats" && git push)
